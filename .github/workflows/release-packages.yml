name: Release Packages

on:
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            command: npm run build:linux -- --publish never
          - os: windows-latest
            target: windows
            command: npm run build:win -- --publish never
          - os: macos-latest
            target: macos
            command: npm run build:mac -- --publish never --config.mac.hardenedRuntime=false --config.mac.gatekeeperAssess=false

    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: ${{ matrix.command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claudoro-${{ matrix.target }}
          path: dist/**
          if-no-files-found: warn
