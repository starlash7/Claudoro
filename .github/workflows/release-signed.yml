name: Release Signed (macOS + Windows)

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target platform to release
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos
          - all

permissions:
  contents: write

jobs:
  signed-macos:
    if: ${{ github.event.inputs.target == 'macos' || github.event.inputs.target == 'all' }}
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_LINK: ${{ secrets.CSC_LINK_MAC }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD_MAC }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Validate mac signing secrets
        run: |
          missing=()
          [[ -z "$CSC_LINK" ]] && missing+=("CSC_LINK_MAC")
          [[ -z "$CSC_KEY_PASSWORD" ]] && missing+=("CSC_KEY_PASSWORD_MAC")
          [[ -z "$APPLE_ID" ]] && missing+=("APPLE_ID")
          [[ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [[ -z "$APPLE_TEAM_ID" ]] && missing+=("APPLE_TEAM_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build signed macOS package
        run: npm run build:mac -- --publish always --config.mac.notarize=true

      - name: Verify macOS signature + notarization
        run: |
          set -euo pipefail
          APP_PATH="$(find dist -type d -name 'Claudoro.app' | head -n 1)"
          if [[ -z "${APP_PATH}" ]]; then
            echo "::error::Claudoro.app not found in dist"
            exit 1
          fi

          echo "Checking code signature: ${APP_PATH}"
          SIGN_INFO="$(codesign -dv --verbose=4 "$APP_PATH" 2>&1 || true)"
          echo "$SIGN_INFO"
          if echo "$SIGN_INFO" | grep -q "Signature=adhoc"; then
            echo "::error::Ad-hoc signature detected. macOS build is not properly signed."
            exit 1
          fi

          spctl --assess --type execute -vv "$APP_PATH"

          DMG_PATH="$(find dist -maxdepth 2 -name '*.dmg' | head -n 1)"
          if [[ -z "${DMG_PATH}" ]]; then
            echo "::error::Signed DMG not found in dist"
            exit 1
          fi

          echo "Validating notarization staple: ${DMG_PATH}"
          xcrun stapler validate "$DMG_PATH"

      - name: Upload signed macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claudoro-macos-signed
          path: dist/**
          if-no-files-found: warn

  signed-windows:
    if: ${{ github.event.inputs.target == 'windows' || github.event.inputs.target == 'all' }}
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_LINK: ${{ secrets.CSC_LINK_WIN }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD_WIN }}

    steps:
      - name: Validate windows signing secrets
        run: |
          $missing = @()
          if (-not $env:CSC_LINK) { $missing += "CSC_LINK_WIN" }
          if (-not $env:CSC_KEY_PASSWORD) { $missing += "CSC_KEY_PASSWORD_WIN" }

          if ($missing.Count -gt 0) {
            Write-Error "Missing required secrets: $($missing -join ', ')"
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build signed Windows package
        run: npm run build:win -- --publish always

      - name: Verify Windows Authenticode signature
        shell: pwsh
        run: |
          $setup = Get-ChildItem dist -Recurse -Filter *setup.exe | Select-Object -First 1
          if (-not $setup) {
            throw "Signed setup exe not found in dist."
          }

          $signature = Get-AuthenticodeSignature $setup.FullName
          Write-Host "Installer: $($setup.FullName)"
          Write-Host "Signature status: $($signature.Status)"
          if ($signature.SignerCertificate) {
            Write-Host "Signer subject: $($signature.SignerCertificate.Subject)"
          }

          if ($signature.Status -ne "Valid") {
            throw "Windows installer signature is not valid."
          }

      - name: Upload signed Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claudoro-windows-signed
          path: dist/**
          if-no-files-found: warn
