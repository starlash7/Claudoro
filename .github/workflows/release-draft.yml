name: Release Draft (macOS + Windows)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            command: npm run build:mac -- --publish always
          - os: windows-latest
            target: win
            command: npm run build:win -- --publish always

    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish draft release assets
        run: ${{ matrix.command }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claudoro-${{ matrix.target }}-draft
          path: dist/**
          if-no-files-found: warn
