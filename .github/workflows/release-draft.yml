name: Build Unsigned Draft Artifacts (Internal QA)

on:
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            command: npm run build:mac -- --publish never --config.mac.hardenedRuntime=false --config.mac.gatekeeperAssess=false
          - os: windows-latest
            target: win
            command: npm run build:win -- --publish never

    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned package
        run: ${{ matrix.command }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claudoro-${{ matrix.target }}-draft
          path: dist/**
          if-no-files-found: warn
